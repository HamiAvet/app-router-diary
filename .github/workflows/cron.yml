name: Cron (every 5 minutes)

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  call-cron:
    runs-on: ubuntu-latest
    steps:
      - name: Call my-diary cron endpoint
        run: |
          curl -fsS "${{ secrets.CRON_URL }}" \
            -H "x-cron-secret: ${{ secrets.CRON_SECRET }}"
